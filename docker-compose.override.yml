# TheWatch — Development Override
# Automatically applied: docker compose up -d
# This file overrides docker-compose.yml with dev-specific settings.

services:
  # ============================================================
  # Infrastructure — dev ports and relaxed settings
  # ============================================================

  sqlserver:
    environment:
      MSSQL_SA_PASSWORD: "Watch@Dev2024!"
    ports:
      - "1433:1433"

  postgres:
    environment:
      POSTGRES_PASSWORD: "Watch@GeoDev!"
    ports:
      - "5432:5432"

  kafka:
    ports:
      - "9092:9092"

  redis:
    ports:
      - "6379:6379"

  # ============================================================
  # All services — Development environment + debug logging
  # ============================================================

  p1-coregateway:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__WatchCoreGatewayDB: "Server=sqlserver;Database=WatchCoreGatewayDB;User Id=sa;Password=Watch@Dev2024!;TrustServerCertificate=true"
      Logging__LogLevel__Default: Debug
      Serilog__MinimumLevel: Debug
    ports:
      - "5101:8080"
    volumes:
      - ./TheWatch.P1.CoreGateway/logs:/app/logs

