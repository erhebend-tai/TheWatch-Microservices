# TheWatch — Nginx Reverse Proxy Routes
# Path-based routing to all microservices.
# NIST SC-7: Boundary protection — single ingress point.

server {
    listen 80 default_server;
    server_name _;

    include /etc/nginx/snippets/security-headers.conf;

    # ─── Gateway health check (bypass proxy) ───
    location = /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ─── Dashboard (Blazor UI) — catch-all ───
    location / {
        proxy_pass http://dashboard_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── P1 CoreGateway — profiles, config, services, devices ───
    location /api/profiles {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p1_coregateway_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/config {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p1_coregateway_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/services {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p1_coregateway_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/devices {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p1_coregateway_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── P2 VoiceEmergency — incidents, dispatch, SignalR hubs ───
    location /api/incidents {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p2_voiceemergency_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/dispatch {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p2_voiceemergency_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /hubs/incidents {
        proxy_pass http://p2_voiceemergency_backend;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
    location /hubs/dispatches {
        proxy_pass http://p2_voiceemergency_backend;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ─── P3 MeshNetwork — nodes, messages, channels, topology ───
    location /api/nodes {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p3_meshnetwork_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/messages {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p3_meshnetwork_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/channels {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p3_meshnetwork_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/topology {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p3_meshnetwork_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── P4 Wearable ───
    location /api/wearable {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p4_wearable_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── P5 AuthSecurity — auth, eula, onboarding, security ───
    location /api/auth {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://p5_authsecurity_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/eula {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p5_authsecurity_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/onboarding {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p5_authsecurity_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/security {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p5_authsecurity_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── P6 FirstResponder — responders, SignalR hubs ───
    location /api/responders {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p6_firstresponder_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /hubs/responders {
        proxy_pass http://p6_firstresponder_backend;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
    location /hubs/checkins {
        proxy_pass http://p6_firstresponder_backend;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ─── P7 FamilyHealth ───
    location /api/family {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p7_familyhealth_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── P8 DisasterRelief — disasters, shelters, resources, evacuation ───
    location /api/disasters {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p8_disasterrelief_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/shelters {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p8_disasterrelief_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/resources {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p8_disasterrelief_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/evacuation {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p8_disasterrelief_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── P9 DoctorServices — doctors, appointments, telehealth ───
    location /api/doctors {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p9_doctorservices_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/appointments {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p9_doctorservices_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/telehealth {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p9_doctorservices_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── P10 Gamification ───
    location /api/gamification {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p10_gamification_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── P11 Surveillance — cameras, footage, crime-locations, surveillance, SignalR hubs ───
    location /api/cameras {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p11_surveillance_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/footage {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p11_surveillance_backend;
        include /etc/nginx/snippets/proxy-params.conf;
        client_max_body_size 500m;
    }
    location /api/crime-locations {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p11_surveillance_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /api/surveillance {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://p11_surveillance_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    location /hubs/cameras {
        proxy_pass http://p11_surveillance_backend;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
    location /hubs/detections {
        proxy_pass http://p11_surveillance_backend;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
    location /hubs/footagesubmissions {
        proxy_pass http://p11_surveillance_backend;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ─── Geospatial ───
    location /api/geo {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://geospatial_backend;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── Deny access to hidden files ───
    location ~ /\. {
        deny all;
        return 404;
    }

    # ─── Error pages ───
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
