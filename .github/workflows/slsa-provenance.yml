# =============================================================================
# Item 338 - CI Pipeline Integrity: SLSA Level 2+ Provenance Generation
# =============================================================================
# Compliance: SSDF PS.2 (Protect All Forms of Code from Unauthorized Access
#             and Tampering), OWASP A08:2021 (Software and Data Integrity Failures)
#
# This workflow generates SLSA (Supply-chain Levels for Software Artifacts)
# Level 2+ provenance attestations for TheWatch container images. SLSA L2
# requires:
#   - Provenance is generated by a hosted build service (GitHub Actions)
#   - Provenance is authenticated (signed via OIDC / Sigstore)
#   - Build process is defined in version-controlled configuration
#
# The provenance document attests WHO built the artifact, WHAT source was used,
# HOW it was built, and WHEN the build occurred - enabling downstream consumers
# to verify the integrity and origin of every TheWatch container image.
# =============================================================================

name: SLSA Provenance

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types:
      - completed
    branches:
      - main

  # Allow manual trigger for re-generating provenance if needed
  workflow_dispatch:
    inputs:
      image_digest:
        description: "Specific image digest to attest (sha256:...)"
        required: false
        type: string

permissions:
  contents: read

# Prevent concurrent provenance generation for the same commit
concurrency:
  group: slsa-provenance-${{ github.sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/thewatch

# ---------------------------------------------------------------------------
# TheWatch microservice image matrix - every service that docker-publish builds
# must have provenance generated here.
# ---------------------------------------------------------------------------

jobs:
  # ===========================================================================
  # Job 1: Collect image digests from the triggering docker-publish workflow
  # ===========================================================================
  collect-digests:
    name: Collect Image Digests
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      images: ${{ steps.resolve.outputs.images }}
      build_run_id: ${{ steps.resolve.outputs.build_run_id }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve image digests
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # TheWatch services that produce container images
          SERVICES=(
            "core-gateway"
            "voice-emergency"
            "mesh-network"
            "wearable"
            "auth-security"
            "first-responder"
            "family-health"
            "disaster-relief"
            "doctor-services"
            "gamification"
            "surveillance"
            "geospatial"
            "admin-restapi"
            "dashboard"
          )

          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.image_digest }}" ]; then
            # Manual run with a specific digest - caller must know which service
            echo "Manual provenance generation for digest: ${{ inputs.image_digest }}"
            echo "images=[{\"service\":\"manual\",\"image\":\"${{ env.IMAGE_BASE }}/manual@${{ inputs.image_digest }}\",\"digest\":\"${{ inputs.image_digest }}\"}]" >> "$GITHUB_OUTPUT"
            echo "build_run_id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
            echo "source_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUILD_RUN_ID="${{ github.event.workflow_run.id }}"
          SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"

          echo "Collecting digests from docker-publish run: ${BUILD_RUN_ID}"
          echo "Source commit: ${SOURCE_SHA}"

          # Query the container registry for each service image tagged with this SHA
          IMAGES="[]"
          for svc in "${SERVICES[@]}"; do
            IMAGE="${{ env.IMAGE_BASE }}/${svc}"
            TAG="sha-${SOURCE_SHA:0:7}"

            echo "Checking ${IMAGE}:${TAG}..."

            # Use GitHub API to get the package version digest
            DIGEST=$(gh api \
              "orgs/${{ github.repository_owner }}/packages/container/thewatch%2F${svc}/versions" \
              --jq ".[] | select(.metadata.container.tags[] == \"${TAG}\") | .name" \
              2>/dev/null || echo "")

            if [ -n "${DIGEST}" ]; then
              echo "  Found digest: ${DIGEST}"
              IMAGES=$(echo "${IMAGES}" | jq -c \
                --arg svc "${svc}" \
                --arg img "${IMAGE}@${DIGEST}" \
                --arg dig "${DIGEST}" \
                '. + [{"service": $svc, "image": $img, "digest": $dig}]')
            else
              echo "  WARNING: No image found for ${svc}:${TAG} - skipping"
            fi
          done

          IMAGE_COUNT=$(echo "${IMAGES}" | jq length)
          echo "Resolved ${IMAGE_COUNT} images for provenance generation"

          if [ "${IMAGE_COUNT}" -eq 0 ]; then
            echo "::error::No images found for provenance generation"
            exit 1
          fi

          echo "images=${IMAGES}" >> "$GITHUB_OUTPUT"
          echo "build_run_id=${BUILD_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Job 2: Generate SLSA provenance using the official SLSA GitHub generator
  # ===========================================================================
  generate-provenance:
    name: Generate SLSA Provenance
    needs: collect-digests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write    # Required for OIDC-based Sigstore signing
      packages: write    # Required to attach attestations to container images
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.collect-digests.outputs.images) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.collect-digests.outputs.source_sha }}
          fetch-depth: 1

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------
      # Generate SLSA provenance attestation
      # Uses GitHub's built-in attestation action which produces SLSA v1.0
      # provenance predicates signed via Sigstore (Fulcio + Rekor).
      # This satisfies SLSA Build Level 2:
      #   - Build definition is version-controlled (this file)
      #   - Provenance is generated by the build service (GitHub)
      #   - Provenance is signed with short-lived OIDC certs (Sigstore)
      # -----------------------------------------------------------------
      - name: Generate SLSA provenance attestation
        id: provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: "${{ env.IMAGE_BASE }}/${{ matrix.image.service }}"
          subject-digest: ${{ matrix.image.digest }}
          push-to-registry: true

      # -----------------------------------------------------------------
      # Additionally sign the image with Cosign for keyless verification.
      # This provides a second layer of attestation beyond the SLSA
      # provenance, allowing `cosign verify` by downstream consumers.
      # -----------------------------------------------------------------
      - name: Sign container image with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            --recursive \
            "${{ matrix.image.image }}"

      - name: Verify provenance attestation
        run: |
          echo "Verifying attestation for ${{ matrix.image.image }}..."

          gh attestation verify \
            "oci://${{ matrix.image.image }}" \
            --owner "${{ github.repository_owner }}" \
            --format json | jq '.[] | {
              predicateType: .verificationResult.statement.predicateType,
              buildType: .verificationResult.statement.predicate.buildDefinition.buildType,
              runId: .verificationResult.statement.predicate.runDetails.builder.id
            }'

          echo "Provenance verification successful for ${{ matrix.image.service }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export provenance document
        id: export
        run: |
          mkdir -p provenance-output

          gh attestation verify \
            "oci://${{ matrix.image.image }}" \
            --owner "${{ github.repository_owner }}" \
            --format json > "provenance-output/${{ matrix.image.service }}-provenance.json"

          # Extract key fields for the summary
          echo "### ${{ matrix.image.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ matrix.image.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest | \`${{ matrix.image.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source SHA | \`${{ needs.collect-digests.outputs.source_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SLSA Level | 2 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Signed | Sigstore (keyless OIDC) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload provenance artifact
        uses: actions/upload-artifact@v4
        with:
          name: slsa-provenance-${{ matrix.image.service }}
          path: provenance-output/
          retention-days: 90
          if-no-files-found: error

  # ===========================================================================
  # Job 3: Aggregate all provenance documents into a single artifact
  # ===========================================================================
  aggregate-provenance:
    name: Aggregate Provenance
    needs:
      - collect-digests
      - generate-provenance
    runs-on: ubuntu-latest
    if: always() && needs.collect-digests.result == 'success'

    permissions:
      contents: read
      actions: read

    steps:
      - name: Download all provenance artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: slsa-provenance-*
          path: all-provenance/
          merge-multiple: true

      - name: Create provenance manifest
        run: |
          set -euo pipefail

          cd all-provenance/

          echo "========================================"
          echo "  TheWatch SLSA Provenance Manifest"
          echo "========================================"
          echo ""
          echo "Build Run:  ${{ needs.collect-digests.outputs.build_run_id }}"
          echo "Source SHA: ${{ needs.collect-digests.outputs.source_sha }}"
          echo "Generated:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "SLSA Level: 2"
          echo ""

          # Combine all individual provenance files into a manifest
          jq -s '{
            manifest_version: "1.0",
            project: "TheWatch",
            slsa_level: 2,
            source_sha: "${{ needs.collect-digests.outputs.source_sha }}",
            build_run_id: "${{ needs.collect-digests.outputs.build_run_id }}",
            generated_at: (now | todate),
            compliance: {
              ssdf: "PS.2 - Protect All Forms of Code from Unauthorized Access and Tampering",
              owasp: "A08:2021 - Software and Data Integrity Failures",
              slsa: "Build Level 2 - Hosted, Signed Provenance"
            },
            attestations: [.[] | {
              service: input_filename,
              predicate_type: (.[0].verificationResult.statement.predicateType // "unknown"),
              verified: true
            }]
          }' *.json > provenance-manifest.json

          echo "Manifest created:"
          jq '.' provenance-manifest.json

          # Summary
          TOTAL=$(ls -1 *-provenance.json 2>/dev/null | wc -l)
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## SLSA Provenance Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Total attestations**: ${TOTAL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SLSA Level**: 2 (Hosted, Signed)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Source**: \`${{ needs.collect-digests.outputs.source_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Signing**: Sigstore keyless (Fulcio OIDC + Rekor transparency log)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Compliance" >> "$GITHUB_STEP_SUMMARY"
          echo "- SSDF PS.2: Protect All Forms of Code from Unauthorized Access and Tampering" >> "$GITHUB_STEP_SUMMARY"
          echo "- OWASP A08:2021: Software and Data Integrity Failures" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregated provenance
        uses: actions/upload-artifact@v4
        with:
          name: slsa-provenance-all-${{ needs.collect-digests.outputs.source_sha }}
          path: all-provenance/
          retention-days: 365
          if-no-files-found: warn

  # ===========================================================================
  # Job 4: Notify on failure - provenance generation is a security control
  # ===========================================================================
  notify-failure:
    name: Notify on Failure
    needs:
      - collect-digests
      - generate-provenance
      - aggregate-provenance
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Report provenance failure
        run: |
          echo "::error::SLSA provenance generation failed for commit ${{ github.sha }}"
          echo ""
          echo "This is a SECURITY-CRITICAL failure. SLSA provenance is required"
          echo "for supply chain integrity compliance (SSDF PS.2, OWASP A08)."
          echo ""
          echo "Action required:"
          echo "  1. Investigate the failure in the workflow logs"
          echo "  2. Do NOT deploy images without valid provenance"
          echo "  3. Re-run this workflow once the issue is resolved"
          echo ""
          echo "If the docker-publish workflow succeeded but images are not found"
          echo "in the registry, check GHCR package visibility settings."

      # Uncomment when Slack webhook is configured:
      # - name: Slack notification
      #   uses: slackapi/slack-github-action@v2
      #   with:
      #     webhook: ${{ secrets.SLACK_SECURITY_WEBHOOK }}
      #     webhook-type: incoming-webhook
      #     payload: |
      #       {
      #         "text": "SLSA provenance generation FAILED for TheWatch commit ${{ github.sha }}. This is a security-critical control - investigate immediately.",
      #         "blocks": [
      #           {
      #             "type": "header",
      #             "text": {"type": "plain_text", "text": "SLSA Provenance Failure"}
      #           },
      #           {
      #             "type": "section",
      #             "text": {"type": "mrkdwn", "text": "*Commit*: `${{ github.sha }}`\n*Workflow*: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\n*Compliance*: SSDF PS.2, OWASP A08"}
      #           }
      #         ]
      #       }
