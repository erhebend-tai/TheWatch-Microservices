name: NuGet — Pack & Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_suffix:
        description: "Optional version suffix (e.g., beta.1)"
        required: false

concurrency:
  group: nuget-publish
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_QUALITY: "preview"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  pack-and-publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'nuget.config', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore TheWatch.sln

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="1.0.0"
          fi
          SUFFIX="${{ github.event.inputs.version_suffix }}"
          if [[ -n "$SUFFIX" ]]; then
            echo "version_args=-p:VersionPrefix=$VERSION --version-suffix $SUFFIX" >> "$GITHUB_OUTPUT"
          else
            echo "version_args=-p:VersionPrefix=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack NuGet packages
        run: |
          PACK_ARGS="-c Release --no-restore -o ./nupkgs ${{ steps.version.outputs.version_args }}"
          PACKABLE_PROJECTS=(
            "TheWatch.Contracts.Abstractions"
            "TheWatch.Contracts.CoreGateway"
            "TheWatch.Contracts.VoiceEmergency"
            "TheWatch.Contracts.MeshNetwork"
            "TheWatch.Contracts.Wearable"
            "TheWatch.Contracts.AuthSecurity"
            "TheWatch.Contracts.FirstResponder"
            "TheWatch.Contracts.FamilyHealth"
            "TheWatch.Contracts.DisasterRelief"
            "TheWatch.Contracts.DoctorServices"
            "TheWatch.Contracts.Gamification"
            "TheWatch.Contracts.Geospatial"
            "TheWatch.Contracts.Surveillance"
            "TheWatch.Shared"
            "TheWatch.Generators"
          )
          for project in "${PACKABLE_PROJECTS[@]}"; do
            echo "::group::Packing $project"
            dotnet pack "$project/$project.csproj" $PACK_ARGS
            echo "::endgroup::"
          done

      - name: List packages
        run: ls -la ./nupkgs/

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
