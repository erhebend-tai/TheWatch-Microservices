name: Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore TheWatch.sln

      - name: Build solution
        run: dotnet build TheWatch.sln --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test TheWatch.P1.CoreGateway.Tests/TheWatch.P1.CoreGateway.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test TheWatch.P2.VoiceEmergency.Tests/TheWatch.P2.VoiceEmergency.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test TheWatch.P3.MeshNetwork.Tests/TheWatch.P3.MeshNetwork.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test TheWatch.P4.Wearable.Tests/TheWatch.P4.Wearable.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test TheWatch.P5.AuthSecurity.Tests/TheWatch.P5.AuthSecurity.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test TheWatch.P6.FirstResponder.Tests/TheWatch.P6.FirstResponder.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test TheWatch.P7.FamilyHealth.Tests/TheWatch.P7.FamilyHealth.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test TheWatch.P8.DisasterRelief.Tests/TheWatch.P8.DisasterRelief.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test TheWatch.P9.DoctorServices.Tests/TheWatch.P9.DoctorServices.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test TheWatch.P10.Gamification.Tests/TheWatch.P10.Gamification.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test TheWatch.Mobile.Tests/TheWatch.Mobile.Tests.csproj --configuration Release --no-build --verbosity normal
