name: Code Quality

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore TheWatch.sln

      - name: Check formatting
        run: dotnet format TheWatch.sln --verify-no-changes --verbosity diagnostic
