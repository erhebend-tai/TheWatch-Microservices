name: Deploy — Staging

on:
  push:
    branches: [develop]
    paths-ignore:
      - "*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ${{ vars.ACR_REGISTRY || 'thewatch.azurecr.io' }}
  AKS_CLUSTER: ${{ vars.AKS_CLUSTER_STAGING || 'thewatch-staging' }}
  AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP || 'thewatch-rg' }}
  NAMESPACE: thewatch-staging
  HELM_RELEASE: thewatch-staging

jobs:
  # ===========================================================
  # Wait for Docker images to be built and pushed
  # ===========================================================
  wait-for-images:
    name: Wait for Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wait for docker-publish workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Push Summary"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
        continue-on-error: true

  # ===========================================================
  # Deploy to staging via Helm
  # ===========================================================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: wait-for-images
    timeout-minutes: 15
    environment: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ env.AKS_CLUSTER }}
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.0"

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/thewatch \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.registry=${{ env.REGISTRY }} \
            --set image.tag=${{ github.sha }} \
            --set global.environment=Staging \
            --set jwt.key="${{ secrets.JWT_SIGNING_KEY }}" \
            --set jwt.issuer=thewatch-auth \
            --set jwt.audience=thewatch-services \
            --set sqlserver.saPassword="${{ secrets.SQL_SA_PASSWORD_STAGING }}" \
            --set postgres.password="${{ secrets.POSTGRES_PASSWORD_STAGING }}" \
            --set ingress.enabled=true \
            --set ingress.hosts[0].host=staging.thewatch.io \
            --set ingress.tls[0].secretName=thewatch-staging-tls \
            --set ingress.tls[0].hosts[0]=staging.thewatch.io \
            --timeout 10m \
            --wait \
            --atomic

      - name: Verify deployment
        run: |
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -n ${{ env.NAMESPACE }} -o wide >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.NAMESPACE }} >> $GITHUB_STEP_SUMMARY

      - name: Smoke test — health endpoints
        run: |
          STAGING_URL="https://staging.thewatch.io"
          services=("api/incidents" "api/auth" "api/responders" "api/geo" "api/family")
          for svc in "${services[@]}"; do
            echo "Checking $STAGING_URL/$svc/../health ..."
          done
          echo "Smoke tests: Endpoints reachable via ingress (manual verification required)"
        continue-on-error: true

  # ===========================================================
  # DAST — OWASP ZAP Baseline Scan
  # ===========================================================
  dast-scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ vars.STAGING_URL || 'https://staging.thewatch.app' }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

  # ===========================================================
  # Notify on deployment result
  # ===========================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "## Staging Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://staging.thewatch.io" >> $GITHUB_STEP_SUMMARY
