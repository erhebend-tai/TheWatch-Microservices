name: CI — Build & Test

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "helm/**"
  push:
    branches: [main, develop]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "helm/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_QUALITY: "preview"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ===========================================================
  # Build all projects (per-project to avoid OOM — see D017)
  # ===========================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'nuget.config', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      # Copy Hangfire Pro packages to local source path expected by nuget.config
      - name: Setup Hangfire Pro local source
        run: |
          mkdir -p /tmp/hangfire-local
          echo "Hangfire Pro packages must be cached in CI. Skipping if not available."
        continue-on-error: true

      - name: Restore dependencies
        run: dotnet restore TheWatch.sln

      # Build per-project to avoid MSBuild OOM (D017)
      - name: Build Shared + Generators
        run: |
          dotnet build src/shared/TheWatch.Shared/TheWatch.Shared.csproj -c Release --no-restore
          dotnet build src/shared/TheWatch.Generators/TheWatch.Generators.csproj -c Release --no-restore

      - name: Build microservices
        run: |
          for project in \
            src/services/TheWatch.P1.CoreGateway \
            src/services/TheWatch.P2.VoiceEmergency \
            src/services/TheWatch.P3.MeshNetwork \
            src/services/TheWatch.P4.Wearable \
            src/services/TheWatch.P5.AuthSecurity \
            src/services/TheWatch.P6.FirstResponder \
            src/services/TheWatch.P7.FamilyHealth \
            src/services/TheWatch.P8.DisasterRelief \
            src/services/TheWatch.P9.DoctorServices \
            src/services/TheWatch.P10.Gamification \
            src/services/TheWatch.P11.Surveillance \
            src/services/TheWatch.P12.Notifications \
            src/services/TheWatch.Geospatial \
            src/clients/TheWatch.Dashboard; do
            echo "::group::Building $project"
            dotnet build "$project/${project##*/}.csproj" -c Release --no-restore
            echo "::endgroup::"
          done

      - name: Build test projects
        run: |
          for project in \
            tests/TheWatch.P1.CoreGateway.Tests \
            tests/TheWatch.P2.VoiceEmergency.Tests \
            tests/TheWatch.P3.MeshNetwork.Tests \
            tests/TheWatch.P4.Wearable.Tests \
            tests/TheWatch.P5.AuthSecurity.Tests \
            tests/TheWatch.P6.FirstResponder.Tests \
            tests/TheWatch.P7.FamilyHealth.Tests \
            tests/TheWatch.P8.DisasterRelief.Tests \
            tests/TheWatch.P9.DoctorServices.Tests \
            tests/TheWatch.P10.Gamification.Tests \
            tests/TheWatch.P11.Surveillance.Tests \
            tests/TheWatch.P12.Notifications.Tests \
            tests/TheWatch.Geospatial.Tests \
            tests/TheWatch.Mobile.Tests; do
            echo "::group::Building $project"
            dotnet build "$project/${project##*/}.csproj" -c Release --no-restore
            echo "::endgroup::"
          done

      - name: Validate NuGet pack (packable projects)
        run: |
          PACKABLE_PROJECTS=(
            "src/contracts/TheWatch.Contracts.Abstractions"
            "src/contracts/TheWatch.Contracts.CoreGateway"
            "src/contracts/TheWatch.Contracts.VoiceEmergency"
            "src/contracts/TheWatch.Contracts.MeshNetwork"
            "src/contracts/TheWatch.Contracts.Wearable"
            "src/contracts/TheWatch.Contracts.AuthSecurity"
            "src/contracts/TheWatch.Contracts.FirstResponder"
            "src/contracts/TheWatch.Contracts.FamilyHealth"
            "src/contracts/TheWatch.Contracts.DisasterRelief"
            "src/contracts/TheWatch.Contracts.DoctorServices"
            "src/contracts/TheWatch.Contracts.Gamification"
            "src/contracts/TheWatch.Contracts.Geospatial"
            "src/contracts/TheWatch.Contracts.Surveillance"
            "src/contracts/TheWatch.Contracts.Notifications"
            "src/shared/TheWatch.Shared"
            "src/shared/TheWatch.Generators"
          )
          for project in "${PACKABLE_PROJECTS[@]}"; do
            echo "::group::Packing $project"
            dotnet pack "$project/${project##*/}.csproj" -c Release --no-restore --no-build -o ./nupkgs
            echo "::endgroup::"
          done
          echo "Packable project validation complete. $(ls ./nupkgs/*.nupkg | wc -l) packages produced."

      # Upload build output for test job
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/bin/Release/
            **/obj/Release/
          retention-days: 1

  # ===========================================================
  # Run tests (matrix strategy for parallelism)
  # ===========================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        project:
          - tests/TheWatch.P1.CoreGateway.Tests
          - tests/TheWatch.P2.VoiceEmergency.Tests
          - tests/TheWatch.P3.MeshNetwork.Tests
          - tests/TheWatch.P4.Wearable.Tests
          - tests/TheWatch.P5.AuthSecurity.Tests
          - tests/TheWatch.P6.FirstResponder.Tests
          - tests/TheWatch.P7.FamilyHealth.Tests
          - tests/TheWatch.P8.DisasterRelief.Tests
          - tests/TheWatch.P9.DoctorServices.Tests
          - tests/TheWatch.P10.Gamification.Tests
          - tests/TheWatch.P11.Surveillance.Tests
          - tests/TheWatch.P12.Notifications.Tests
          - tests/TheWatch.Geospatial.Tests
          - tests/TheWatch.Mobile.Tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'nuget.config', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Run tests — ${{ matrix.project }}
        run: |
          PROJECT="${{ matrix.project }}"
          dotnet test "${PROJECT}/${PROJECT##*/}.csproj" \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.project }}
          path: |
            **/test-results.trx
            **/coverage.cobertura.xml
          retention-days: 7

  # ===========================================================
  # Format check
  # ===========================================================
  format:
    name: Code Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'nuget.config', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore TheWatch.sln

      - name: Check formatting
        run: dotnet format TheWatch.sln --verify-no-changes --verbosity diagnostic
