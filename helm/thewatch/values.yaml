# TheWatch Helm Chart — Default Values
# Override per environment with -f values-staging.yaml or -f values-production.yaml

global:
  imageRegistry: ""  # e.g., myregistry.azurecr.io
  imagePullSecrets: []
  environment: Production

# Container registry prefix (set to your ACR/ECR/GCR)
image:
  registry: thewatch.azurecr.io
  pullPolicy: IfNotPresent
  tag: "latest"

# JWT configuration (shared across all services)
jwt:
  key: ""        # Override via --set or secrets
  issuer: "thewatch-auth"
  audience: "thewatch-services"

# ============================================================
# Infrastructure
# ============================================================

sqlserver:
  enabled: true
  host: "thewatch-sql"
  port: 1433
  user: "sa"
  # Password provided via Kubernetes Secret (thewatch-db-credentials)

postgres:
  enabled: true
  host: "thewatch-postgis"
  port: 5432
  user: "postgres"
  database: "WatchGeospatialDB"

kafka:
  enabled: true
  bootstrapServers: "thewatch-kafka:9092"

redis:
  enabled: true
  host: "thewatch-redis"
  port: 6379

# ============================================================
# Microservices
# ============================================================

services:
  p1-coregateway:
    enabled: true
    replicaCount: 2
    image:
      repository: thewatch-p1-coregateway
    port: 8080
    database: WatchCoreGatewayDB
    dbType: sqlserver
    kafka: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    pathPrefix: /api/p1

  p2-voiceemergency:
    enabled: true
    replicaCount: 3
    image:
      repository: thewatch-p2-voiceemergency
    port: 8080
    database: WatchVoiceEmergencyDB
    dbType: sqlserver
    kafka: true
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: "1Gi"
    pathPrefix: /api/p2
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 20
      targetCPU: 60
      targetMemory: 75

