# ============================================================
# Ingress
# ============================================================

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: thewatch.example.com
      paths: []  # Auto-generated from service pathPrefixes
  tls:
    - secretName: thewatch-tls
      hosts:
        - thewatch.example.com
