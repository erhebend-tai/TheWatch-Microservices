{{/*
  Kubernetes Secrets for sensitive credentials.
  In production, use External Secrets Operator or Azure Key Vault CSI driver.
  These templates provide the structure; actual values should be provided
  via --set, sealed-secrets, or external secret management.
*/}}

---
apiVersion: v1
kind: Secret
metadata:
  name: thewatch-db-credentials
  labels:
    {{- include "thewatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  # SQL Server SA password — MUST be overridden in production
  sql-sa-password: {{ required "sqlserver SA password is required" .Values.sqlserver.saPassword | default "" | quote }}
  # PostgreSQL password — MUST be overridden in production
  postgres-password: {{ required "postgres password is required" .Values.postgres.password | default "" | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: thewatch-jwt-credentials
  labels:
    {{- include "thewatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT signing key — MUST be overridden in production (min 256-bit)
  signing-key: {{ required "JWT signing key is required" .Values.jwt.key | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: thewatch-api-keys
  labels:
    {{- include "thewatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Inter-service API key for service-to-service auth
  service-api-key: {{ .Values.serviceApiKey | default "change-me-in-production" | quote }}
  # Firebase Cloud Messaging server key (for push notifications)
  firebase-server-key: {{ .Values.firebaseServerKey | default "" | quote }}
