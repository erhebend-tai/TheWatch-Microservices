# TheWatch — Kubernetes Network Policies (Zero Trust)
# NIST AC-4: Information Flow Enforcement
# NIST SC-7: Boundary Protection
# DISA STIG V-222531: Network segmentation for containerized workloads
#
# Default: deny all ingress and egress.
# Each service gets explicit allow rules for only the traffic it needs.

# ============================================================
# 1. Default Deny All — namespace-wide
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: thewatch
    security.thewatch.io/policy: zero-trust
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# ============================================================
# 2. Allow DNS egress for all pods (required for service discovery)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: thewatch
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ============================================================
# 3. P1 CoreGateway — API Gateway can reach all services
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: p1-coregateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: thewatch
spec:
  podSelector:
    matchLabels:
      app: p1-coregateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept from ingress controller / load balancer
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Accept from dashboard
    - from:
        - podSelector:
            matchLabels:
              app: dashboard
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Can reach all P* services
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: thewatch
      ports:
        - protocol: TCP
          port: 8080
    # Can reach SQL Server
    - to:
        - podSelector:
            matchLabels:
              app: sqlserver
      ports:
        - protocol: TCP
          port: 1433
    # Can reach Kafka
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 29092

---
# ============================================================
# 4. P2 VoiceEmergency — can reach P5 (auth), P6 (dispatch), Kafka, SQL
# ============================================================
apiVersion: networking.k8s.io/v1
